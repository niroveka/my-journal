<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Журнал</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f0e8;
            font-family: 'Inter', sans-serif;
            color: #1e1e1e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .magazine-wrapper {
            background: #fcf9f4;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(0, 0, 0, 0.04);
            padding: 24px;
            max-width: 1100px;
            width: 100%;
            position: relative;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            color: #7a6e5e;
            cursor: pointer;
            border-radius: 40px;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .tab-btn:hover {
            background: #ede7de;
            color: #1e1e1e;
        }

        .tab-btn.active {
            background: #1e1e1e;
            color: #fcf9f4;
        }

        .fullscreen-btn {
            background: #ede7de;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: #1e1e1e;
            cursor: pointer;
            transition: background 0.2s;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .fullscreen-btn:hover {
            background: #dcd3c6;
        }

        .pages-container {
            display: flex;
            justify-content: center;
        }

        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .page.active {
            display: flex;
        }

        .page img {
            width: 100%;
            max-width: 820px;
            height: auto;
            border-radius: 18px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid #ede7de;
            margin-bottom: 16px;
            cursor: pointer;
        }

        .flip-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .flip-btn {
            background: #ede7de;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: #1e1e1e;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
        }

        .flip-btn:hover {
            background: #dcd3c6;
        }

        .flip-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .page-counter {
            font-size: 14px;
            color: #7a6e5e;
            background: #ede7de;
            padding: 6px 18px;
            border-radius: 40px;
        }

        .cube-section {
            text-align: center;
            padding: 20px 0;
        }

        .cube-section h2 {
            font-size: 28px;
            font-weight: 500;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .cube-section .sub {
            color: #7a6e5e;
            font-size: 15px;
            margin-bottom: 24px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .cube-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .cube-viewport {
            width: 220px;
            height: 220px;
            perspective: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cube-viewport.hidden {
            display: none;
        }

        .cube-box {
            width: 200px;
            height: 200px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-radius: 20px;
        }

        .cube-box.hidden {
            display: none;
        }

        .cube-face {
            position: absolute;
            width: 200px;
            height: 200px;
            background: #fcf9f4;
            border-radius: 20px;
            box-shadow: inset 0 0 0 2px #e8dfd3;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            backface-visibility: hidden;
        }

        .cube-face img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 18px;
        }

        .cube-face .face-placeholder {
            font-size: 50px;
            color: #a89986;
            background: #ede7de;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
        }

        .cube-face-front {
            transform: translateZ(100px);
        }
        .cube-face-back {
            transform: rotateY(180deg) translateZ(100px);
        }
        .cube-face-right {
            transform: rotateY(90deg) translateZ(100px);
        }
        .cube-face-left {
            transform: rotateY(-90deg) translateZ(100px);
        }
        .cube-face-top {
            transform: rotateX(90deg) translateZ(100px);
        }
        .cube-face-bottom {
            transform: rotateX(-90deg) translateZ(100px);
        }

        .cube-result-text {
            font-size: 15px;
            color: #1e1e1e;
            background: #f5f0e8;
            padding: 12px 24px;
            border-radius: 16px;
            max-width: 500px;
            border: 1px solid #ede7de;
            line-height: 1.5;
            text-align: left;
            font-style: italic;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .cube-result-text.show {
            opacity: 1;
        }

        .cube-btn {
            background: #1e1e1e;
            color: #fcf9f4;
            border: none;
            padding: 14px 40px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .cube-btn:hover {
            background: #3a3a3a;
            transform: scale(1.02);
        }

        .cube-btn:active {
            transform: scale(0.96);
        }

        .cube-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .cube-history {
            margin-top: 8px;
            font-size: 13px;
            color: #a89986;
            min-height: 24px;
        }

        .playlist-section {
            padding: 12px 0;
        }

        .playlist-section h2 {
            font-size: 28px;
            font-weight: 500;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .playlist-section .sub {
            color: #7a6e5e;
            font-size: 15px;
            margin-bottom: 24px;
        }

        .song-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 700px;
            margin: 0 auto;
        }

        .song-item {
            background: #f5f0e8;
            border-radius: 16px;
            padding: 14px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid #ede7de;
            transition: background 0.2s;
        }

        .song-item:hover {
            background: #ede7de;
        }

        .song-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .song-info {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            min-width: 160px;
        }

        .song-number {
            font-size: 14px;
            font-weight: 500;
            color: #a89986;
            min-width: 28px;
        }

        .song-name {
            font-weight: 500;
            font-size: 16px;
        }

        .song-artist {
            font-size: 14px;
            color: #7a6e5e;
        }

        .song-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .song-play-btn {
            background: #1e1e1e;
            color: #fcf9f4;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .song-play-btn:hover {
            background: #3a3a3a;
            transform: scale(1.02);
        }

        .song-play-btn.playing {
            background: #c0392b;
        }

        .song-play-btn i {
            font-size: 13px;
        }

        .song-vk-btn {
            background: #4a76a8;
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .song-vk-btn:hover {
            background: #3a5f8a;
            transform: scale(1.02);
        }

        .song-vk-btn i {
            font-size: 14px;
        }

        .song-player {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 6px 12px;
            background: #ede7de;
            border-radius: 40px;
            width: 100%;
        }

        .song-player.active {
            display: flex;
        }

        .song-player .time-current {
            font-size: 12px;
            color: #7a6e5e;
            min-width: 36px;
            font-variant-numeric: tabular-nums;
        }

        .song-player .time-total {
            font-size: 12px;
            color: #7a6e5e;
            min-width: 36px;
            font-variant-numeric: tabular-nums;
        }

        .song-player input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: #dcd3c6;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .song-player input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #1e1e1e;
            cursor: pointer;
        }

        .song-player input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #1e1e1e;
            cursor: pointer;
            border: none;
        }

        .magazine-wrapper.fullscreen {
            max-width: 100vw;
            max-height: 100vh;
            border-radius: 0;
            padding: 16px;
            overflow-y: auto;
        }

        .magazine-wrapper.fullscreen .page img {
            max-height: 70vh;
            object-fit: contain;
        }

        @media (max-width: 640px) {
            .magazine-wrapper {
                padding: 12px;
            }
            .top-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
            .tabs {
                gap: 4px;
                justify-content: center;
            }
            .tab-btn {
                font-size: 12px;
                padding: 6px 12px;
            }
            .fullscreen-btn {
                font-size: 12px;
                padding: 6px 14px;
                justify-content: center;
            }
            .flip-btn {
                padding: 8px 16px;
                font-size: 13px;
            }
            .cube-viewport {
                width: 180px;
                height: 180px;
            }
            .cube-box {
                width: 160px;
                height: 160px;
            }
            .cube-face {
                width: 160px;
                height: 160px;
            }
            .cube-face-front {
                transform: translateZ(80px);
            }
            .cube-face-back {
                transform: rotateY(180deg) translateZ(80px);
            }
            .cube-face-right {
                transform: rotateY(90deg) translateZ(80px);
            }
            .cube-face-left {
                transform: rotateY(-90deg) translateZ(80px);
            }
            .cube-face-top {
                transform: rotateX(90deg) translateZ(80px);
            }
            .cube-face-bottom {
                transform: rotateX(-90deg) translateZ(80px);
            }
            .cube-result-text {
                font-size: 13px;
                padding: 10px 16px;
                min-height: 50px;
            }
            .song-top {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .song-controls {
                justify-content: flex-start;
            }
            .song-player {
                padding: 6px 10px;
                gap: 8px;
            }
            .song-player .time-current,
            .song-player .time-total {
                font-size: 11px;
                min-width: 30px;
            }
        }

        @media (max-width: 820px) {
            .page img {
                border-radius: 12px;
            }
        }

        @media (max-width: 480px) {
            .page img {
                border-radius: 8px;
            }
            .flip-controls {
                gap: 8px;
            }
            .flip-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
            .page-counter {
                font-size: 12px;
                padding: 4px 12px;
            }
        }
    </style>
</head>
<body>

    <div class="magazine-wrapper" id="magazineWrapper">

        <div class="top-bar">
            <div class="tabs" id="tabs">
                <button class="tab-btn active" data-tab="reader">Читать</button>
                <button class="tab-btn" data-tab="cube">Кубик</button>
                <button class="tab-btn" data-tab="playlist">Плейлист</button>
            </div>
            <button class="fullscreen-btn" id="fullscreenBtn"><i class="fas fa-expand"></i> На весь экран</button>
        </div>

        <div class="page active" id="page-reader">
            <div class="pages-container">
                <div class="page active" data-page="0">
                    <img src="images/page-01-cover.jpg" alt="Обложка" />
                </div>
            </div>
            <div class="flip-controls">
                <button class="flip-btn" id="prevPage"><i class="fas fa-chevron-left"></i> Назад</button>
                <span class="page-counter" id="pageCounter">1 / 11</span>
                <button class="flip-btn" id="nextPage">Вперёд <i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="page" id="page-cube">
            <div class="cube-section">
                <h2>Кубик</h2>
                <p class="sub">Мне не хватало этой игры и были несколько заготовленных фоток, так что делюсь с ними так)</p>

                <div class="cube-display">
                    <div class="cube-viewport hidden" id="cubeViewport">
                        <div class="cube-box hidden" id="cubeBox">
                            <div class="cube-face cube-face-front" data-side="1"><div class="face-placeholder">⚀</div></div>
                            <div class="cube-face cube-face-back" data-side="6"><div class="face-placeholder">⚅</div></div>
                            <div class="cube-face cube-face-right" data-side="2"><div class="face-placeholder">⚁</div></div>
                            <div class="cube-face cube-face-left" data-side="5"><div class="face-placeholder">⚄</div></div>
                            <div class="cube-face cube-face-top" data-side="3"><div class="face-placeholder">⚂</div></div>
                            <div class="cube-face cube-face-bottom" data-side="4"><div class="face-placeholder">⚃</div></div>
                        </div>
                    </div>

                    <div class="cube-result-text" id="cubeResultText"></div>

                    <button class="cube-btn" id="rollCube"><i class="fas fa-dice"></i> КИНУТЬ</button>
                    <div class="cube-history" id="cubeHistory">Нажми «Кинуть», чтобы начать</div>
                </div>
            </div>
        </div>

        <div class="page" id="page-playlist">
            <div class="playlist-section">
                <h2>Плейлист ассоциаций</h2>
                <p class="sub">Песни, которые ассоциируются с тобой и нашим общением</p>
                <div class="song-list" id="songList"></div>
            </div>
        </div>

    </div>

    <script>
        const pages = [
            'page-01-cover.jpg',
            'page-02-contents.jpg',
            'page-03-who.jpg',
            'page-04-name.jpg',
            'page-05-commander.jpg',
            'page-06-nicknames.jpg',
            'page-07-stickers.jpg',
            'page-08-horoscope.jpg',
            'page-09-how-i-see.jpg',
            'page-10-reviews.jpg',
            'page-11-back.jpg',
        ];

        let currentPage = 0;
        const container = document.querySelector('.pages-container');

        const songs = [{
            name: 'Жду чуда',
            artist: '25/17',
            mp3: 'audio/zhdu-chuda.mp3',
            vk: 'https://vk.com/audio-2001832197_108832197'
        }, {
            name: 'Под цыганским солнцем',
            artist: '25/17',
            mp3: 'audio/pod-tsyganskim-solntsem.mp3',
            vk: 'https://vk.com/audio-2001831948_108831948'
        }, {
            name: 'Will I Always Feel This Way?',
            artist: 'instant crush',
            mp3: 'audio/will-i-always-feel.mp3',
            vk: 'https://vk.com/audio534692911_456243135_352b532a0cab368bb1'
        }, {
            name: 'Дорога',
            artist: 'L\'One feat. Jasmine',
            mp3: 'audio/doroga.mp3',
            vk: 'https://vk.com/audio-2001739360_90739360'
        }, {
            name: 'Люблю',
            artist: 'Марія Чайковська feat. Евгений Соя',
            mp3: 'audio/lyublyu.mp3',
            vk: 'https://vk.com/audio-2001003571_86003571'
        }, {
            name: 'Без тебя',
            artist: 'Rozhden',
            mp3: 'audio/bez-tebya.mp3',
            vk: 'https://vk.com/audio-2001885213_92885213'
        }, {
            name: 'Молчи и обнимай меня крепче',
            artist: 'Шура Кузнецова',
            mp3: 'audio/molchi.mp3',
            vk: 'https://vk.com/audio-2001062035_124062035'
        }, {
            name: 'Рядом С Тобой',
            artist: 'GONE.Fludd',
            mp3: 'audio/ryadom.mp3',
            vk: 'https://vk.com/audio-2001285172_135285172'
        }, {
            name: 'Космосом',
            artist: 'Матвей Князев, Виктория Копылова',
            mp3: 'audio/kosmosom.mp3',
            vk: 'https://vk.com/audio-2001116453_132116453'
        }, {
            name: 'Что хочешь ты?',
            artist: 'Небраска',
            mp3: 'audio/chto-hochesh.mp3',
            vk: 'https://vk.com/audio-2001785248_147785248'
        }, {
            name: 'О5',
            artist: '130 по встречной на старенькой Vespa',
            mp3: 'audio/o5.mp3',
            vk: 'https://vk.com/audio-2001829915_123829915'
        }];

        const cubeData = [{
            photo: 'images/cube-photos/cube-1.jpg',
            caption: 'Я синюшная просто'
        }, {
            photo: 'images/cube-photos/cube-2.jpg',
            caption: 'Я скрывала кое-что о себе... я была квадробером.... надеюсь, вы примете меня и такую и не выдадите мой секрет'
        }, {
            photo: 'images/cube-photos/cube-3.jpg',
            caption: 'Думайте, с кем связались. Это я в цирке'
        }, {
            photo: 'images/cube-photos/cube-4.jpg',
            caption: 'Ну тут просто цепочку красивую купила и прицепила на талию. Металл правда потом окислялся и я ходила с голубым пузом'
        }, {
            photo: 'images/cube-photos/cube-5.jpg',
            caption: 'Почему-то нравится, как выгляжу, когда болею. Глаза сразу горящие такие, лёгкая припухлость и розовые щёчки. Вот одна из таких фоток'
        }, {
            photo: 'images/cube-photos/cube-6.jpg',
            caption: 'Мне кажется, я тут очень похожа на Печаль из мультика "Головоломка". Свитер прабабушка связала!'
        }];

        function renderPages() {
            container.innerHTML = '';
            pages.forEach((file, index) => {
                const div = document.createElement('div');
                div.className = 'page' + (index === currentPage ? ' active' : '');
                div.dataset.page = index;

                const img = document.createElement('img');
                img.src = 'images/' + file;
                img.alt = 'Страница ' + (index + 1);

                div.appendChild(img);
                container.appendChild(div);
            });
            updateCounter();
            updateButtons();
        }

        function updateCounter() {
            document.getElementById('pageCounter').textContent = (currentPage + 1) + ' / ' + pages.length;
        }

        function updateButtons() {
            document.getElementById('prevPage').disabled = (currentPage === 0);
            document.getElementById('nextPage').disabled = (currentPage === pages.length - 1);
        }

        function goToPage(index) {
            if (index < 0 || index >= pages.length) return;
            document.querySelectorAll('.pages-container .page').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });
            currentPage = index;
            updateCounter();
            updateButtons();
        }

        document.getElementById('prevPage').addEventListener('click', () => goToPage(currentPage - 1));
        document.getElementById('nextPage').addEventListener('click', () => goToPage(currentPage + 1));

        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('page-reader').classList.contains('active')) return;
            if (e.key === 'ArrowLeft') goToPage(currentPage - 1);
            if (e.key === 'ArrowRight') goToPage(currentPage + 1);
        });

        const wrapper = document.getElementById('magazineWrapper');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {
                    wrapper.classList.toggle('fullscreen');
                });
                wrapper.classList.add('fullscreen');
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i> Выйти';
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
                wrapper.classList.remove('fullscreen');
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i> На весь экран';
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                wrapper.classList.remove('fullscreen');
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i> На весь экран';
            } else {
                wrapper.classList.add('fullscreen');
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i> Выйти';
            }
        });

        const tabs = document.querySelectorAll('.tab-btn');
        const pagesMap = {
            reader: document.getElementById('page-reader'),
            cube: document.getElementById('page-cube'),
            playlist: document.getElementById('page-playlist'),
        };

        tabs.forEach(btn => {
            btn.addEventListener('click', () => {
                tabs.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tab = btn.dataset.tab;
                Object.keys(pagesMap).forEach(key => {
                    pagesMap[key].classList.toggle('active', key === tab);
                });
                if (tab === 'reader') {
                    renderPages();
                    goToPage(currentPage);
                }
            });
        });

        const cubeBox = document.getElementById('cubeBox');
        const cubeViewport = document.getElementById('cubeViewport');
        const cubeResultText = document.getElementById('cubeResultText');
        const rollBtn = document.getElementById('rollCube');
        const cubeHistory = document.getElementById('cubeHistory');

        let isRolling = false;
        let hasRolled = false;

        const sideRotations = {
            1: 'rotateX(0deg) rotateY(0deg)',
            2: 'rotateX(0deg) rotateY(-90deg)',
            3: 'rotateX(-90deg) rotateY(0deg)',
            4: 'rotateX(90deg) rotateY(0deg)',
            5: 'rotateX(0deg) rotateY(90deg)',
            6: 'rotateX(0deg) rotateY(180deg)',
        };

        function populateCubeFaces() {
            const faces = cubeBox.querySelectorAll('.cube-face');
            faces.forEach(face => {
                const side = parseInt(face.dataset.side);
                const data = cubeData[side - 1];
                const placeholder = face.querySelector('.face-placeholder');
                if (placeholder) {
                    placeholder.textContent = '';
                    const img = document.createElement('img');
                    img.src = data.photo;
                    img.alt = 'Сторона ' + side;
                    img.style.width = '100%';
                    img.style.height = '100%';
                    img.style.objectFit = 'cover';
                    img.style.borderRadius = '18px';
                    placeholder.appendChild(img);
                }
            });
        }
        populateCubeFaces();

        function rollCube() {
            if (isRolling) return;
            isRolling = true;
            rollBtn.disabled = true;

            cubeResultText.classList.remove('show');
            cubeResultText.textContent = '';

            if (!hasRolled) {
                cubeViewport.classList.remove('hidden');
                cubeBox.classList.remove('hidden');
                hasRolled = true;
            }

            const side = Math.floor(Math.random() * 6) + 1;
            let finalRotation = sideRotations[side];

            setTimeout(() => {
                const startX = (Math.random() - 0.5) * 30;
                const startY = (Math.random() - 0.5) * 30;
                cubeBox.style.transition = 'none';
                cubeBox.style.transform = `rotateX(${startX}deg) rotateY(${startY}deg) scale(0.95)`;

                requestAnimationFrame(() => {
                    cubeBox.style.transition = 'transform 1.8s cubic-bezier(0.34, 1.56, 0.64, 1)';
                    const fullRotX = 360 * (3 + Math.floor(Math.random() * 3));
                    const fullRotY = 360 * (3 + Math.floor(Math.random() * 3));
                    const sideX = parseFloat(finalRotation.match(/rotateX\(([^)]+)\)/)[1]) || 0;
                    const sideY = parseFloat(finalRotation.match(/rotateY\(([^)]+)\)/)[1]) || 0;

                    const targetX = fullRotX + sideX;
                    const targetY = fullRotY + sideY;
                    cubeBox.style.transform = `rotateX(${targetX}deg) rotateY(${targetY}deg) scale(1)`;

                    const onEnd = () => {
                        cubeBox.removeEventListener('transitionend', onEnd);
                        isRolling = false;
                        rollBtn.disabled = false;

                        const data = cubeData[side - 1];
                        cubeResultText.textContent = data.caption;
                        cubeResultText.classList.add('show');

                        cubeHistory.textContent = 'Нажми «Кинуть», чтобы попробовать снова';
                    };
                    cubeBox.addEventListener('transitionend', onEnd);
                });
            }, 30);
        }

        rollBtn.addEventListener('click', rollCube);

        cubeViewport.classList.add('hidden');
        cubeBox.classList.add('hidden');
        cubeResultText.classList.remove('show');
        cubeHistory.textContent = 'Нажми «Кинуть», чтобы начать';

        const songList = document.getElementById('songList');
        let currentAudio = null;
        let currentButton = null;
        let currentPlayer = null;
        let currentProgress = null;
        let currentTimeDisplay = null;
        let isDragging = false;

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return mins + ':' + String(secs).padStart(2, '0');
        }

        songs.forEach((song, index) => {
            const item = document.createElement('div');
            item.className = 'song-item';

            const top = document.createElement('div');
            top.className = 'song-top';

            const info = document.createElement('div');
            info.className = 'song-info';
            info.innerHTML = `
                <span class="song-number">${String(index+1).padStart(2,'0')}</span>
                <span class="song-name">${song.name}</span>
                <span class="song-artist">${song.artist}</span>
            `;

            const controls = document.createElement('div');
            controls.className = 'song-controls';

            const playBtn = document.createElement('button');
            playBtn.className = 'song-play-btn';
            playBtn.innerHTML = `<i class="fas fa-play"></i> Слушать`;
            playBtn.dataset.mp3 = song.mp3;

            const vkBtn = document.createElement('button');
            vkBtn.className = 'song-vk-btn';
            vkBtn.innerHTML = `<i class="fab fa-vk"></i> ВК`;
            vkBtn.dataset.vk = song.vk;

            const player = document.createElement('div');
            player.className = 'song-player';
            player.innerHTML = `
                <span class="time-current">0:00</span>
                <input type="range" min="0" max="100" value="0" />
                <span class="time-total">0:00</span>
            `;

            const progress = player.querySelector('input[type="range"]');
            const timeCurrent = player.querySelector('.time-current');
            const timeTotal = player.querySelector('.time-total');

            let audio = null;

            playBtn.addEventListener('click', () => {
                if (currentButton === playBtn && audio) {
                    if (audio.paused) {
                        audio.play().catch(() => {
                            window.open(song.vk, '_blank');
                        });
                        playBtn.innerHTML = `<i class="fas fa-pause"></i> Пауза`;
                        playBtn.classList.add('playing');
                    } else {
                        audio.pause();
                        playBtn.innerHTML = `<i class="fas fa-play"></i> Слушать`;
                        playBtn.classList.remove('playing');
                    }
                    return;
                }

                if (currentAudio) {
                    currentAudio.pause();
                    if (currentButton) {
                        currentButton.innerHTML = `<i class="fas fa-play"></i> Слушать`;
                        currentButton.classList.remove('playing');
                    }
                    if (currentPlayer) {
                        currentPlayer.classList.remove('active');
                    }
                }

                if (!audio) {
                    audio = new Audio(song.mp3);

                    audio.addEventListener('loadedmetadata', () => {
                        timeTotal.textContent = formatTime(audio.duration);
                    });

                    audio.addEventListener('timeupdate', () => {
                        if (!isDragging) {
                            const progressVal = (audio.currentTime / audio.duration) * 100;
                            progress.value = progressVal;
                            timeCurrent.textContent = formatTime(audio.currentTime);
                        }
                    });

                    audio.addEventListener('ended', () => {
                        playBtn.innerHTML = `<i class="fas fa-play"></i> Слушать`;
                        playBtn.classList.remove('playing');
                        player.classList.remove('active');
                        currentButton = null;
                        currentAudio = null;
                        currentPlayer = null;
                        progress.value = 0;
                        timeCurrent.textContent = '0:00';
                        audio.currentTime = 0;
                    });

                    audio.addEventListener('error', () => {
                        window.open(song.vk, '_blank');
                        playBtn.innerHTML = `<i class="fas fa-play"></i> Слушать`;
                        playBtn.classList.remove('playing');
                        player.classList.remove('active');
                        currentButton = null;
                        currentAudio = null;
                        currentPlayer = null;
                    });
                }

                currentAudio = audio;
                currentButton = playBtn;
                currentPlayer = player;
                currentProgress = progress;
                currentTimeDisplay = timeCurrent;

                audio.play().catch(() => {
                    window.open(song.vk, '_blank');
                    playBtn.innerHTML = `<i class="fas fa-play"></i> Слушать`;
                    playBtn.classList.remove('playing');
                    player.classList.remove('active');
                    currentButton = null;
                    currentAudio = null;
                    currentPlayer = null;
                });

                playBtn.innerHTML = `<i class="fas fa-pause"></i> Пауза`;
                playBtn.classList.add('playing');
                player.classList.add('active');

                progress.addEventListener('input', () => {
                    isDragging = true;
                    const val = parseFloat(progress.value);
                    timeCurrent.textContent = formatTime((val / 100) * audio.duration);
                });

                progress.addEventListener('change', () => {
                    isDragging = false;
                    const val = parseFloat(progress.value);
                    audio.currentTime = (val / 100) * audio.duration;
                });
            });

            vkBtn.addEventListener('click', () => {
                window.open(song.vk, '_blank');
            });

            controls.appendChild(playBtn);
            controls.appendChild(vkBtn);
            top.appendChild(info);
            top.appendChild(controls);
            item.appendChild(top);
            item.appendChild(player);
            songList.appendChild(item);
        });

        renderPages();
    </script>
</body>
</html>
